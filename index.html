<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzikly</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">

                </div>
            <nav class="navigation">
                <ul>
                    <li><a href="#"><i class="fas fa-compass"></i> Discover</a></li>
                    <li><a href="#"><i class="fas fa-headphones"></i> My Playlists</a></li>
                    <li><a href="#"><i class="fas fa-heart"></i> Favourites</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="search-bar">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Search...">
                    <button>Search</button>
                </div>
                <div class="user-icons">
                    <a href="#"><i class="fab fa-github"></i></a>
                    <a href="#"><i class="fas fa-moon"></i></a>
                </div>
            </header>

            <section class="album-grid">
                <!-- Album items will be dynamically added here or hardcoded for now -->
            </section>
        </main>
    </div>

    <footer class="audio-player">
        <div class="current-song">
            <img src="https://github.com/CX-Banger/cx-devdocs/blob/main/cover-album/one-way-jesus.jpg?raw=true" alt="Album Art" class="album-art">
            <div class="song-info">
                <div class="song-title">YHWH</div>
                <div class="song-artist">Synaï</div>
            </div>
        </div>
        <div class="controls">
            <button><i class="fas fa-backward"></i></button>
            <button><i class="fas fa-play"></i></button>
            <button><i class="fas fa-forward"></i></button>
            <button><i class="fas fa-random"></i></button>
            <button><i class="fas fa-redo-alt"></i></button>
        </div>
        <div class="progress-bar">
            <span class="current-time">00:01</span>
            <input type="range" class="progress-slider" value="0">
            <span class="total-time">03:53</span>
        </div>
        <div class="volume-control">
            <button><i class="fas fa-volume-up"></i></button>
            <input type="range" class="volume-slider" value="100">
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
